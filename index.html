<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ENG7101 Practice</title>
<meta name="theme-color" content="#1E2636" />
<meta name="description" content="ENG7101 Practice — an English practice app by Abdul Wahid." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" />
<style>
  :root{
    --ink:#1E2636; --inkSoft:#55607a; --paper:#F4F0E7; --surface:#FFFDF9;
    --line:#E7DFCC; --goldLine:#D9C48E; --accent:#1E6F5C; --accentSoft:#E7F0EC;
    --gold:#9C7A2E; --goldSoft:#F6EDD6; --correct:#1E7A4D; --correctBg:#E9F3EC;
    --wrong:#A5352B; --wrongBg:#F8EAE7; --muted:#8B8470;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    color:var(--ink);background:var(--paper);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55}
  .serif{font-family:"Cormorant Garamond",Georgia,"Times New Roman",serif;font-weight:500}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 1px 2px rgba(30,22,10,.05)}
  .wrap{max-width:820px;margin:0 auto;padding:30px 22px 70px}
  .wrap-narrow{max-width:620px}
  .tile{cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}
  .tile:hover{transform:translateY(-3px);box-shadow:0 16px 34px rgba(30,22,10,.13),0 2px 6px rgba(30,22,10,.06);border-color:var(--goldLine)}
  .tile:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .soon{opacity:.6;cursor:default}
  .soon:hover{transform:none;box-shadow:none;border-color:var(--line)}
  .btn{font:inherit;font-weight:600;border-radius:10px;border:1px solid var(--ink);
    background:var(--ink);color:#fff;padding:11px 20px;cursor:pointer;transition:opacity .12s,box-shadow .12s,transform .12s;
    box-shadow:0 2px 8px rgba(15,12,6,.16)}
  .btn:hover{opacity:.9;box-shadow:0 4px 14px rgba(15,12,6,.22)}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--ink);opacity:1}
  .opt{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;font:inherit;
    background:var(--surface);border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;cursor:pointer;
    transition:border-color .12s,background .12s}
  .opt:hover:not(:disabled){border-color:var(--gold)}
  .opt:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
  .opt:disabled{cursor:default}
  .input{font:inherit;width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;
    background:var(--surface);color:var(--ink)}
  .input:focus{outline:none;border-color:var(--gold)}
  textarea.input{resize:vertical;min-height:170px;line-height:1.6}
  .mark{background:linear-gradient(180deg,transparent 58%,var(--goldSoft) 58%);padding:0 1px}
  .link{background:none;border:none;color:var(--accent);font:inherit;font-weight:600;cursor:pointer;
    padding:0;text-decoration:underline;text-underline-offset:3px}
  .head{border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:5;box-shadow:0 1px 0 rgba(217,196,142,.35),0 6px 18px rgba(30,22,10,.04)}
  .head-in{max-width:820px;margin:0 auto;padding:13px 22px;display:flex;align-items:center;gap:14px}
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(248px,1fr))}
  .badge{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);
    border:1px solid var(--line);border-radius:20px;padding:2px 8px;white-space:nowrap}
  .scorebadge{font-size:12px;font-weight:700;color:var(--gold);background:transparent;
    border:1px solid var(--goldLine);border-radius:20px;padding:2px 9px;white-space:nowrap}
  .scorepill{font-size:12.5px;font-weight:700;color:var(--gold);background:var(--goldSoft);
    border:1px solid var(--goldLine);border-radius:20px;padding:2px 10px;white-space:nowrap}
  .masthead{display:flex;align-items:center;gap:18px}
  .medallion{width:60px;height:60px;border-radius:14px;flex:0 0 auto;object-fit:cover;
    box-shadow:0 8px 22px rgba(15,12,6,.30);border:1px solid rgba(0,0,0,.22)}
  .medallion.sm{width:34px;height:34px;border-radius:9px;box-shadow:0 4px 12px rgba(15,12,6,.28)}
  .medallion.xs{width:26px;height:26px;border-radius:7px;box-shadow:0 3px 9px rgba(15,12,6,.25)}
  .title{font-family:"Cormorant Garamond",Georgia,"Times New Roman",serif;font-size:46px;line-height:1.0;margin:0;
    font-weight:600;letter-spacing:-.005em;color:var(--ink)}
  .byline{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-top:8px}
  .byline .nm{color:var(--ink);letter-spacing:.13em}
  .goldrule{height:1px;background:linear-gradient(90deg,var(--goldLine),rgba(217,196,142,0));margin:20px 0 0}
  .sectlabel{font-family:"Cormorant Garamond",Georgia,"Times New Roman",serif;font-size:23px;font-weight:600;margin:0;letter-spacing:.005em;color:var(--ink)}
  .diamond{color:var(--goldLine);font-size:10px;letter-spacing:.1em}
  .foot{margin-top:58px;padding-top:24px;border-top:1px solid var(--line);text-align:center}
  .copyline{font-size:12px;letter-spacing:.05em;color:var(--muted)}
  .install{position:fixed;right:18px;bottom:18px;z-index:20;display:none}
  ul{margin:0}
  .idgate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .idcard{max-width:430px;width:100%;padding:30px 28px;text-align:center}
  .idcard .input{text-align:left}
  .idlbl{display:block;text-align:left;font-size:12.5px;font-weight:700;color:var(--inkSoft);margin:13px 0 5px;letter-spacing:.02em}
  .opt-tag{font-weight:400;color:var(--muted)}
  .whoami{display:flex;flex-wrap:wrap;align-items:center;gap:10px 14px;justify-content:space-between;margin-top:18px;
    background:var(--goldSoft);border:1px solid var(--goldLine);border-radius:11px;padding:9px 14px;font-size:13.5px;color:var(--ink)}
  .progsum{padding:16px 18px;margin-top:16px}
  .progsum-row{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .pbar{height:8px;background:var(--line);border-radius:5px;overflow:hidden;margin-top:12px}
  .pbar-fill{height:100%;background:linear-gradient(90deg,#C6A24E,#9C7A2E);border-radius:5px;transition:width .3s}
  .rep-meta{display:flex;flex-wrap:wrap;gap:6px 20px;font-size:13.5px;color:var(--inkSoft)}
  .rep-group{margin-top:22px}
  .rep-glabel{font-family:"Cormorant Garamond",Georgia,"Times New Roman",serif;font-size:19px;font-weight:600;margin-bottom:8px;color:var(--ink)}
  .rep-tbl{width:100%;border-collapse:collapse;font-size:14px}
  .rep-tbl td{padding:9px 12px;border:1px solid var(--line);vertical-align:top}
  .rep-tbl td:first-child{width:55%}
  .rs-done{color:var(--correct);font-weight:600}
  .rs-none{color:var(--muted)}
  .rs-soon{color:var(--muted);font-style:italic}
  .rep-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
  @media print{ .head,.install,.rep-actions,.whoami{display:none!important} body{background:#fff} .card{border-color:#ccc} }
  @media (prefers-reduced-motion: reduce){.tile,.btn,.opt{transition:none}}
</style>
</head>
<body>
<div id="app"></div>
<button id="installBtn" class="btn install">Install app</button>

<script>
/* ============================================================================
   ENG7101 Practice — by Abdul Wahid
   Self-contained offline app. All practice content is ORIGINAL (not taken
   from the course compilation) and written to B1+/B2 (Pearson/Longman) level.
   ============================================================================ */

const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const norm = s => s.toLowerCase().trim().replace(/[.,;!?]+$/,"").replace(/\s+/g," ");

/* ============================================================================
   STUDENT IDENTITY + PROGRESS SYNC
   ----------------------------------------------------------------------------
   ▼▼▼ TEACHER: paste your Google Apps Script Web App URL between the quotes.
   See TEACHER-SETUP.md for the 5-minute setup. Until it is filled in the app
   still works and tracks scores on each device, but nothing is sent to you. ▼▼▼ */
const SYNC_URL = "";
/* ▲▲▲ e.g. "https://script.google.com/macros/s/AKfycb....../exec" ▲▲▲ */

const STUDENT_KEY = "eng7101:student";
const PENDING_KEY = "eng7101:pending";
const DEVICE_KEY  = "eng7101:device";

function getStudent(){ try{ return JSON.parse(localStorage.getItem(STUDENT_KEY)||"null"); }catch(e){ return null; } }
function setStudent(s){ try{ localStorage.setItem(STUDENT_KEY, JSON.stringify(s)); }catch(e){} }
function clearStudent(){ try{ localStorage.removeItem(STUDENT_KEY); }catch(e){} }
function deviceId(){
  let d=""; try{ d=localStorage.getItem(DEVICE_KEY)||""; }catch(e){}
  if(!d){ d="d-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8);
          try{ localStorage.setItem(DEVICE_KEY,d); }catch(e){} }
  return d;
}

/* ---- outbound queue: survives offline / failed sends, retried on next load ---- */
function loadPending(){ try{ return JSON.parse(localStorage.getItem(PENDING_KEY)||"[]"); }catch(e){ return []; } }
function savePending(a){ try{ localStorage.setItem(PENDING_KEY, JSON.stringify(a)); }catch(e){} }
function postRow(row){
  /* text/plain body avoids a CORS preflight that Apps Script cannot answer */
  return fetch(SYNC_URL,{ method:"POST", mode:"no-cors", keepalive:true,
    headers:{ "Content-Type":"text/plain;charset=utf-8" }, body:JSON.stringify(row) });
}
function flushPending(){
  if(!SYNC_URL) return;
  const queue = loadPending(); if(!queue.length) return;
  savePending([]);                                  // optimistic; re-queue failures
  queue.forEach(row=>{ postRow(row).catch(()=>{ const cur=loadPending(); cur.push(row); savePending(cur); }); });
}
function syncResult(activityId, title, kind, score, total, detail){
  const st = getStudent() || {name:"(unnamed)"};
  const row = {
    name:st.name||"", studentId:st.id||"", cls:st.cls||"",
    activityId, activity:title, kind,
    score:(score==null?"":score), total:(total==null?"":total),
    percent:(total? Math.round((score/total)*100) : ""),
    detail:detail||"", device:deviceId(), ts:new Date().toISOString()
  };
  if(!SYNC_URL) return;                              // local-only mode until URL is set
  postRow(row).catch(()=>{ const q=loadPending(); q.push(row); savePending(q); });
}

function renderIdGate(){
  const st = getStudent() || {};
  app.innerHTML = `<div class="idgate"><div class="idcard card">
    <img class="medallion" src="${MARK}" alt="" style="margin-bottom:14px" />
    <div class="eyebrow">Before you start</div>
    <h1 class="serif" style="font-size:26px;margin:6px 0 4px">Who's practising?</h1>
    <p style="color:var(--inkSoft);font-size:14.5px;margin:0 0 6px">Enter your details so your teacher can see the work you complete.</p>
    <label class="idlbl">Full name *</label>
    <input class="input" id="idName" placeholder="e.g. Amina Yusuf" value="${esc(st.name||"")}" autocomplete="name">
    <label class="idlbl">Student ID / number *</label>
    <input class="input" id="idNum" placeholder="e.g. 7101-042" value="${esc(st.id||"")}">
    <label class="idlbl">Class / group <span class="opt-tag">(optional)</span></label>
    <input class="input" id="idCls" placeholder="e.g. Tuesday evening" value="${esc(st.cls||"")}">
    <button class="btn" id="idGo" style="width:100%;margin-top:20px" disabled>Start practising</button>
    <p style="color:var(--muted);font-size:12px;margin:12px 0 0">Your name and ID are used to record which topics you finish. Use the same ID each time so your progress is kept.</p>
  </div></div>`;
  const name=document.getElementById("idName"), num=document.getElementById("idNum"), go=document.getElementById("idGo");
  const check=()=>{ go.disabled=!(name.value.trim() && num.value.trim()); };
  const submit=()=>{
    const nm=name.value.trim(), nid=num.value.trim(); if(!nm||!nid) return;
    setStudent({ name:nm, id:nid, cls:document.getElementById("idCls").value.trim() });
    syncResult("_signin","Signed in","signin",null,null);
    renderHome();
  };
  [name,num].forEach(inp=>inp.addEventListener("input",check)); check();
  [name,num,document.getElementById("idCls")].forEach(inp=>{
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter" && name.value.trim() && num.value.trim()) submit(); });
  });
  go.addEventListener("click",submit);
  name.focus(); window.scrollTo(0,0);
}
function whoamiHTML(){
  const st=getStudent(); if(!st) return "";
  const extra=[st.id,st.cls].filter(Boolean).join(" · ");
  return `<div class="whoami">
    <span>Signed in as <strong>${esc(st.name)}</strong>${extra?` <span style="color:var(--muted)">(${esc(extra)})</span>`:""}</span>
    <button class="link" data-act="switch">Not you? Switch</button></div>`;
}

ructure:", "options": ["He answered quickly, politely, and in a confident way.", "He answered quickly, politely, and confidently."], "answer": 1, "why": "Match the adverb form across all items."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["The coach said that we should rest, that we should eat well, and that we should arrive early.", "The coach said that we should rest, that we should eat well, and to arrive early."], "answer": 0, "why": "A list of ‘that’ clauses must continue with ‘that’ clauses."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["She explained what the problem was and the way of fixing it.", "She explained what the problem was and how to fix it."], "answer": 1, "why": "Two parallel structures (‘what…’, ‘how…’) are balanced; the other option breaks the pattern."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["The report was written by the team and presented to the board.", "The report was written by the team and they presented it to the board."], "answer": 0, "why": "Keep the same (passive) voice across the joined verbs."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["He designed the logo, and the website was built by him.", "He designed the logo and built the website."], "answer": 1, "why": "Don’t switch from active to passive; keep both verbs active."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["Bring these to the exam: a pen, an ID card, and a calculator.", "Bring these to the exam: a pen, an ID card, and you should bring a calculator."], "answer": 0, "why": "Keep all items in a colon list in the same (noun) form."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["The course covers three areas: writing reports, giving talks, and how to negotiate.", "The course covers three areas: writing reports, giving talks, and negotiating deals."], "answer": 1, "why": "Match the ‑ing form across the listed items."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["Cycling to work is healthier than driving.", "Cycling to work is healthier than to drive."], "answer": 0, "why": "Compare like with like — gerund with gerund."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["Their team played better than us.", "Their team played better than ours."], "answer": 1, "why": "Compare team with team (‘ours’), keeping the structures parallel."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["She not only sings but also dances.", "She not only sings but also she dances."], "answer": 0, "why": "‘Not only… but also…’ should join parallel forms (sings / dances)."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["The trip was not only expensive but also it was tiring.", "The trip was not only expensive but also tiring."], "answer": 1, "why": "Join two parallel adjectives after the correlative."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["He is skilled both in writing and in speaking.", "He is skilled both in writing and he speaks well."], "answer": 0, "why": "‘both… and…’ must link parallel structures (in writing / in speaking)."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["The plan is both practical and it saves money.", "The plan is both practical and economical."], "answer": 1, "why": "Join two parallel adjectives with ‘both… and…’."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["She neither called nor wrote.", "She neither called nor did she write."], "answer": 0, "why": "‘neither… nor…’ should join parallel verbs (called / wrote)."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["The room was neither clean nor was it tidy.", "The room was neither clean nor tidy."], "answer": 1, "why": "Join two parallel adjectives after ‘neither… nor…’."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["We can either take the bus or walk.", "We can either take the bus or we walk."], "answer": 0, "why": "‘either… or…’ should join parallel verbs (take / walk)."}, {"type": "mcq", "q": "Choose the version with correct parallel structure:", "options": ["You may either pay now or you pay on delivery.", "You may either pay now or pay on delivery."], "answer": 1, "why": "Keep the two options parallel after ‘either… or…’."}];

function chunkDecks(prefix,label,words,size){
  var decks=[];
  for(var i=0;i<words.length;i+=size){
    var chunk=words.slice(i,i+size), n=Math.floor(i/size)+1;
    decks.push({ id:prefix+"_"+n, title:label+" · Deck "+n, desc:chunk.length+" academic words · flashcards, recall & review", words:chunk });
  }
  return decks;
}
const VOCAB_DECKS = chunkDecks("wl1","Academic List 1", AWL1_WORDS, 12)
  .concat(chunkDecks("wl2","Academic List 2", AWL2_WORDS, 12));
const VOCAB_BY_ID = {};
VOCAB_DECKS.forEach(function(d){ VOCAB_BY_ID[d.id]=d; });

function shuffleArr(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }

const VOCAB_SRS_PREFIX = "eng7101:vocab:";
function vocabSrsKey(){ var st=getStudent(); return VOCAB_SRS_PREFIX+((st&&st.id)||(st&&st.name)||"anon"); }
function loadSRS(){ try{ return JSON.parse(localStorage.getItem(vocabSrsKey())||"{}"); }catch(e){ return {}; } }
function saveSRS(m){ try{ localStorage.setItem(vocabSrsKey(), JSON.stringify(m)); }catch(e){} }

let vl = null;
function startDeck(id){
  var d=VOCAB_BY_ID[id]; if(!d) return;
  var srs=loadSRS();
  var words=d.words.map(function(word,idx){
    var key=d.id+":"+idx; var b=(srs[key]&&srs[key].box)||0;
    return {w:word.w,pos:word.pos,def:word.def,ex:word.ex,key:key,box:b};
  });
  vl={deck:d,words:words,stage:"flash",
      queue:words.map(function(_,i){return i;}),reshow:{},drill:{},known:{},snap:[],
      flipped:false,qList:[],qi:0};
  renderVocab();
}
function vlStepsHTML(active){

  return '<div style="display:flex;gap:8px;margin-bottom:16px">'+steps.map(function(s){
    var on=s[0]===active;
    return '<button data-vlstep="'+s[0]+'" title="Go to '+esc(s[1].split(" · ")[1])+'" style="flex:1;text-align:center;font:inherit;font-size:12px;font-weight:700;padding:8px 4px;border-radius:8px;cursor:pointer;border:1px solid '+(on?"var(--gold)":"var(--line)")+';color:'+(on?"var(--gold)":"var(--muted)")+';background:'+(on?"var(--goldSoft)":"var(--surface)")+'">'+s[1]+'</button>';

}
function renderVocab(){

}
function renderFlash(){

  app.innerHTML=headerHTML(vl.deck.title)+'<div class="wrap wrap-narrow" style="padding-top:26px">'+
    vlStepsHTML("flash")+

    '<div class="card" id="vlCard" role="button" tabindex="0" style="padding:34px 24px;text-align:center;min-height:150px;cursor:pointer;display:flex;flex-direction:column;justify-content:center">'+
      (vl.flipped
        ? '<div><div style="font-size:18px;line-height:1.5">'+esc(c.def)+'</div><div style="font-size:14px;color:var(--inkSoft);font-style:italic;margin-top:12px;line-height:1.5">“'+esc(c.ex)+'”</div></div>'
        : '<div><div class="serif" style="font-size:30px;font-weight:600">'+esc(c.w)+'</div><div style="font-size:13px;color:var(--muted);margin-top:8px">'+(c.pos?esc(c.pos)+' · ':'')+'tap to reveal meaning</div></div>')+
    '</div>'+

    '</div>';

}
function vlAdvanceFlash(learn){
  var ci=vl.queue[0], word=vl.words[ci];
  vl.flipped=false;
  var srs=loadSRS(); var cur=srs[word.key]||{box:word.box||0,seen:0,correct:0};
  vl.snap.push({queue:vl.queue.slice(),drill:Object.assign({},vl.drill),known:Object.assign({},vl.known),reshow:Object.assign({},vl.reshow),key:word.key,box:word.box,srsBox:(srs[word.key]?srs[word.key].box:undefined)});
  vl.queue.shift();
  if(learn){
    vl.drill[ci]=true; delete vl.known[ci];
    cur.box=0; word.box=0;
    vl.reshow[ci]=(vl.reshow[ci]||0)+1;
    if(vl.reshow[ci]<=2){ vl.queue.push(ci); }   // a still-learning word returns up to twice more
  } else {
    delete vl.drill[ci]; vl.known[ci]=true;
    cur.box=Math.min((cur.box||0)+1,5); word.box=cur.box;
  }
  srs[word.key]=cur; saveSRS(srs);
  if(!vl.queue.length){ return finishMeet(); }
  renderVocab();
}
function finishMeet(){
  if(!Object.keys(vl.drill).length){ vl.stage="done"; renderVocab(); return; }
  vl.stage="train"; buildTrain(); renderVocab();
}
function buildTrain(){
  var idxs=Object.keys(vl.drill).map(Number);
  if(!idxs.length){ idxs=vl.words.map(function(_,i){ return i; }); }   // nothing flagged -> practise the whole deck
  var words=idxs.map(function(i){ return vl.words[i]; }).sort(function(a,b){ return a.box-b.box; });
  var types=["d2w","w2d","gap"];
  vl.qList=words.map(function(word,n){ var q=makeVQ(word, types[n%types.length]); q.chosen=null; q.checked=false; q.correct=false; return q; });
  vl.qi=0;
}
function makeVQ(word,type){
  var pool=vl.deck.words;
  if(type==="gap"){
    var esc2=word.w.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    var reExact=new RegExp("\\b"+esc2+"\\b","i");
    if(reExact.test(word.ex)){
      return {type:"fill",word:word,prompt:"Type the word that fits:",stem:word.ex.replace(reExact,"______"),accept:[word.w]};
    }
    var reInfl=new RegExp("\\b"+esc2+"(s|es|ed|d|ing|ally|ly|ies)?\\b","i");
    var m=word.ex.match(reInfl);
    if(m){
      return {type:"fill",word:word,prompt:"Type the word that fits:",stem:word.ex.replace(reInfl,"______"),accept:[m[0],word.w]};
    }
    type="d2w";
  }
  var others=shuffleArr(pool.filter(function(x){ return x.w!==word.w; })).slice(0,3);
  if(type==="d2w"){
    var opts=shuffleArr([word.w].concat(others.map(function(x){ return x.w; })));
    return {type:"mcq",word:word,prompt:"Which word means this?",stem:word.def,options:opts,answer:opts.indexOf(word.w)};
  }
  var opts2=shuffleArr([word.def].concat(others.map(function(x){ return x.def; })));
  return {type:"mcq",word:word,prompt:"What does this word mean?",stem:word.w,options:opts2,answer:opts2.indexOf(word.def)};
}
function vlFillCorrect(it,val){ return it.accept.some(function(a){ return norm(a)===norm(val||""); }); }
function trainScore(){ return vl.qList.filter(function(q){ return q.checked&&q.correct; }).length; }
function renderTrain(){
  if(!vl.qList.length) buildTrain();
  var it=vl.qList[vl.qi], total=vl.qList.length, checked=it.checked, chosen=it.chosen;
  var body="";
  if(it.type==="mcq"){
    body='<div style="display:grid;gap:9px">'+it.options.map(function(opt,idx){

    body='<input class="input" id="vlFill" placeholder="Type the word" value="'+esc(chosen||"")+'" '+(checked?"disabled":"")+' style="'+st+'">';
  }
  var fb="";

       '<div style="font-weight:700;color:'+(ok?"var(--correct)":"var(--wrong)")+';font-size:13.5px">'+(ok?"Correct":"Not quite")+'</div>'+
       '<p style="margin:5px 0 0;font-size:14px"><strong>'+esc(it.word.w)+'</strong> — '+esc(it.word.def)+'</p></div>';
  }

  else { var dis=(chosen===null||chosen==="")?"disabled":""; right+='<button class="btn" id="vlCheckBtn" data-vl="check" '+dis+'>Check</button>'; }
  var nav='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap">'+
    '<div>'+((vl.qi>0)?'<button class="btn btn-ghost" data-vl="vprev">&larr; Previous</button>':'')+'</div>'+
    '<div style="display:flex;gap:10px;flex-wrap:wrap">'+right+'</div></div>';
  app.innerHTML=headerHTML(vl.deck.title)+'<div class="wrap wrap-narrow" style="padding-top:26px">'+
    vlStepsHTML("train")+
    '<div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-bottom:8px"><span>Practice · question '+(vl.qi+1)+' of '+total+'</span><span class="scorepill">Score '+trainScore()+'/'+total+'</span></div>'+
    '<div style="height:5px;background:var(--line);border-radius:4px;margin-bottom:22px;overflow:hidden"><div style="width:'+((vl.qi+1)/total*100)+'%;height:100%;background:var(--gold)"></div></div>'+
    '<div class="card" style="padding:22px">'+
      '<div class="eyebrow" style="margin-bottom:8px">'+esc(it.prompt)+'</div>'+

function vlCheck(){
  var it=vl.qList[vl.qi];
  if(it.type==="fill"){ var f=document.getElementById("vlFill"); if(f) it.chosen=f.value; }
  if(it.chosen===null||it.chosen==="") return;
  it.checked=true;
  it.correct=(it.type==="mcq")?(it.chosen===it.answer):vlFillCorrect(it,it.chosen);

function vlNext(){

function vlBackFlash(){

function vlGoStage(stage){

function renderDone(){
  var srs=loadSRS(), totalDeck=vl.words.length, drilled=vl.qList.length, recalled=trainScore();
  var mastered=vl.words.filter(function(w){ var s=srs[w.key]; return s && s.box>=1; }).length;
  var missed=vl.words.filter(function(w){ var s=srs[w.key]; return !s || s.box===0; });
  var activity=Object.keys(vl.known).length>0 || Object.keys(vl.drill).length>0 || vl.qList.some(function(q){ return q.checked; });
  if(activity){
    recordScore(vl.deck.id,"vocab",mastered,totalDeck);

  app.innerHTML=headerHTML(vl.deck.title)+'<div class="wrap wrap-narrow" style="padding-top:40px">'+
    vlStepsHTML("done")+

      '<div class="serif" style="font-size:44px;font-weight:700;margin:6px 0 2px;color:var(--gold)">'+mastered+' / '+totalDeck+'</div>'+
      '<div style="font-size:12.5px;color:var(--muted);margin:0 0 2px">words mastered'+(drilled?(' · you practised '+drilled+' and recalled '+recalled):'')+'</div>'+
      '<p style="color:var(--inkSoft);margin-top:6px">'+msg+'</p>'+
      (missed.length
        ? '<div style="text-align:left;margin-top:14px;background:var(--goldSoft);border:1px solid var(--goldLine);border-radius:11px;padding:14px"><div class="eyebrow" style="color:var(--gold)">Words to review ('+missed.length+')</div><div style="margin-top:8px;font-size:14px;line-height:1.8">'+missed.map(function(w){ return '<strong>'+esc(w.w)+'</strong> — '+esc(w.def); }).join("<br>")+'</div></div>'
        : '<p style="color:var(--correct);font-weight:700;margin-top:10px">Every word recalled — well done!</p>')+
      '<div style="display:flex;gap:10px;margin-top:18px;justify-content:center;flex-wrap:wrap"><button class="btn" data-vl="again">Study again</button><button class="btn btn-ghost" data-vl="home">Back to topics</button></div>'+
    '</div></div>';

}
function wireVocab(){
  var hb=app.querySelector('[data-act="home"]'); if(hb) hb.addEventListener("click",renderHome);

}

/* ---- per-student progress (localStorage) ------------------------------------
   Progress is stored per student ID so a student can log in again and again,
   retry any topic, and always resume with their own completed/left status —

function progressKey(){ const st=getStudent(); return "eng7101:progress:"+((st&&st.id)||(st&&st.name)||"anon"); }
function loadProgress(){ try{ return JSON.parse(localStorage.getItem(progressKey())||"{}"); }catch(e){ return {}; } }
function saveProgress(p){ try{ localStorage.setItem(progressKey(), JSON.stringify(p)); }catch(e){} }
function recordScore(id, kind, s, t){
  const p=loadProgress(); const e=p[id]||{attempts:0};
  e.attempts=(e.attempts||0)+1; e.kind=kind; e.last={s,t};
  if(!e.best || s>e.best.s) e.best={s,t};
  e.lastTs=new Date().toISOString(); p[id]=e; saveProgress(p); return e;
}
function recordWriting(id, words, ticks, checklistLen){
  const p=loadProgress(); const e=p[id]||{attempts:0};
  e.attempts=(e.attempts||0)+1; e.kind="writing"; e.words=words; e.ticks=ticks; e.checklist=checklistLen;
  e.detail=`${words} words · ${ticks}/${checklistLen} self-checks`;
  e.lastTs=new Date().toISOString(); p[id]=e; saveProgress(p); return e;
}
function isScored(id){ return !!READINGS_BY_ID[id] || !!QUIZ[id]; }

function readyTopics(){ return GROUPS.reduce((a,g)=>a.concat(g.items.filter(i=>i.ready)),[]); }

}

/* ---- QUIZ ENGINE ---- */
/* Randomise MCQ option order so the correct answer is not always in the same
   position. Returns a fresh item; the source data is never mutated. */
function shuffleItem(it){
  if(it.type!=="mcq" || !Array.isArray(it.options)) return it;
  const order = it.options.map((_,i)=>i);
  for(let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=order[i]; order[i]=order[j]; order[j]=t; }
  return {...it, options: order.map(i=>it.options[i]), answer: order.indexOf(it.answer)};
}
function startQuiz(id,items,label,topHtml){
  const mixed = items.map(shuffleItem);
  q = {id,items:mixed,label,top:topHtml||"",i:0,choice:null,checked:false,reveal:false,score:0,done:false};
  renderQuiz();
}
function quizCorrect(){
  const it=q.items[q.i];
  if(it.type==="mcq") return q.choice===it.answer;
  if(it.type==="fill") return q.choice!=null && it.accept.some(a=>norm(a)===norm(q.choice));
  return false;
}
function renderQuiz(){
  const total=q.items.length;
  const autoTotal=q.items.filter(x=>x.type!=="open").length;
  if(q.done){
    if(autoTotal){
      const kind = q.id==="reading" ? "reading" : "quiz";
      const e = recordScore(q.id, kind, q.score, autoTotal);
      syncResult(q.id, q.label, kind, q.score, autoTotal, `best ${e.best.s}/${e.best.t} · attempt ${e.attempts}`);
    }
    const pct=autoTotal?Math.round((q.score/autoTotal)*100):0;
    const msg=pct>=80?"Excellent — you've got this.":pct>=50?"Good progress. Review the ones you missed and try again.":"Worth another pass — read the explanations carefully.";
    app.innerHTML=headerHTML(q.label)+`<div class="wrap wrap-narrow" style="padding-top:48px">
      <div class="card" style="padding:30px;text-align:center">
        <div class="eyebrow">Practice complete</div>
        <div class="serif" style="font-size:46px;font-weight:700;margin:8px 0 2px;color:var(--gold)">${q.score} / ${autoTotal}</div>
        <p style="color:var(--inkSoft);margin-top:0">${msg}</p>
        <button class="btn" style="margin-top:12px" data-act="restart">Try again</button></div></div>`;
    wireQuiz(); return;
  }
  const it=q.items[q.i], checked=q.checked, correct=checked&&quizCorrect();
  let qHtml="";
  if(it.type==="mcq"){
    qHtml=`<div style="display:grid;gap:9px">`+it.options.map((opt,idx)=>{
      let bd="var(--line)",bg="var(--surface)";
      if(checked){ if(idx===it.answer){bd="var(--correct)";bg="var(--correctBg)";} else if(idx===q.choice){bd="var(--wrong)";bg="var(--wrongBg)";} }
      else if(idx===q.choice){bd="var(--gold)";bg="var(--goldSoft)";}
      return `<button class="opt" ${checked?"disabled":""} data-opt="${idx}" style="border-color:${bd};background:${bg}">
        <span style="font-weight:700;color:var(--muted);min-width:16px">${"ABCD"[idx]}</span><span>${esc(opt)}</span></button>`;
    }).join("")+`</div>`;
  } else if(it.type==="fill"){
    const st=checked?`border-color:${correct?"var(--correct)":"var(--wrong)"};background:${correct?"var(--correctBg)":"var(--wrongBg)"}`:"";
    qHtml=`<input class="input" id="fillInput" placeholder="Type the correct word" value="${esc(q.choice||"")}" ${checked?"disabled":""} style="${st}">`;
  } else {
    qHtml=`<textarea class="input" id="openInput" placeholder="Write your answer here, then compare it with the model.">${esc(q.choice||"")}</textarea>`;
    qHtml+=q.reveal
      ?`<div style="margin-top:14px;padding:14px;background:var(--accentSoft);border-radius:11px;border-left:3px solid var(--accent)">
          <div class="eyebrow" style="color:var(--accent)">Model answer</div>
          <p style="margin:6px 0 0;font-size:14.5px">${esc(it.model)}</p></div>`
      :`<button class="link" style="margin-top:12px" data-act="reveal">Show model answer</button>`;
  }
  let fb="";
  if(checked && it.type!=="open"){
    fb=`<div style="margin-top:16px;padding:13px;border-radius:11px;background:${correct?"var(--correctBg)":"var(--wrongBg)"};border-left:3px solid ${correct?"var(--correct)":"var(--wrong)"}">
      <div style="font-weight:700;color:${correct?"var(--correct)":"var(--wrong)"};font-size:13.5px">${correct?"Correct":"Not quite"}</div>
      <p style="margin:5px 0 0;font-size:14px">${esc(it.why)}</p></div>`;
  }
  let nav=`<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px">`;
  if(it.type!=="open" && !checked){
    const dis=(q.choice===null||q.choice==="")?"disabled":"";
    nav+=`<button class="btn" id="checkBtn" ${dis} data-act="check">Check</button>`;
  }
  if(checked||it.type==="open"){ nav+=`<button class="btn" data-act="next">${q.i+1>=total?"Finish":"Next →"}</button>`; }
  nav+=`</div>`;
  app.innerHTML=headerHTML(q.label)+`<div class="wrap wrap-narrow" style="padding-top:30px">
    ${q.top||""}
    <div style="display:flex;justify-content:space-between;font-size:12.5px;color:var(--muted);margin-bottom:8px">
      <span>Question ${q.i+1} of ${total}</span><span class="scorepill">Score ${q.score}/${autoTotal}</span></div>
    <div style="height:5px;background:var(--line);border-radius:4px;margin-bottom:22px;overflow:hidden">
      <div style="width:${(q.i/total)*100}%;height:100%;background:var(--gold);transition:width .2s"></div></div>
    <div class="card" style="padding:22px 22px 24px">
      ${it.base?`<div class="eyebrow" style="margin-bottom:8px">${esc(it.base)}</div>`:""}
      <p class="serif" style="font-size:19px;line-height:1.45;margin:0 0 18px">${esc(it.q)}</p>
      ${qHtml}${fb}</div>${nav}</div>`;
  wireQuiz();
}
function wireQuiz(){
  app.querySelectorAll("[data-act]").forEach(el=>{
    const act=el.getAttribute("data-act");
    el.addEventListener("click",()=>{
      if(act==="home"){ renderHome(); }
      else if(act==="restart"){ q.i=0;q.choice=null;q.checked=false;q.reveal=false;q.score=0;q.done=false;renderQuiz(); }
      else if(act==="reveal"){ const t=document.getElementById("openInput"); if(t)q.choice=t.value; q.reveal=true; renderQuiz(); }
      else if(act==="check"){ doCheck(); }
      else if(act==="next"){ doNext(); }
    });
  });
  app.querySelectorAll("[data-opt]").forEach(el=>{
    el.addEventListener("click",()=>{ q.choice=parseInt(el.getAttribute("data-opt"),10); renderQuiz(); });
  });
  const fill=document.getElementById("fillInput");
  if(fill){
    fill.addEventListener("input",()=>{ q.choice=fill.value; const b=document.getElementById("checkBtn"); if(b)b.disabled=!fill.value.trim(); });
    fill.addEventListener("keydown",e=>{ if(e.key==="Enter"&&fill.value.trim()){ q.choice=fill.value; doCheck(); } });
    fill.focus();
  }
  const open=document.getElementById("openInput");
  if(open) open.addEventListener("input",()=>{ q.choice=open.value; });
}
function doCheck(){
  const it=q.items[q.i];
  if(it.type==="fill"){ const f=document.getElementById("fillInput"); if(f)q.choice=f.value; }
  if(it.type==="open") return;
  q.checked=true; if(quizCorrect()) q.score++; renderQuiz();
}
function doNext(){
  const it=q.items[q.i];
  if(it.type==="open"){ const t=document.getElementById("openInput"); if(t)q.choice=t.value; }
  if(q.i+1>=q.items.length){ q.done=true; renderQuiz(); return; }
  q.i++; q.choice=null; q.checked=false; q.reveal=false; renderQuiz();
}

  });
  const essay=document.getElementById("essay");
  essay.addEventListener("input",()=>{
    w.text=essay.value;

function submitWriting(){
  const d=WRITING[w.id]; if(!d) return;
  const words=w.text.trim()?w.text.trim().split(/\s+/).length:0;
  if(words<3) return;                                 // nothing meaningful written — don't report
  const ticks=Object.keys(w.ticks).filter(k=>w.ticks[k]).length;
  const e=recordWriting(w.id, words, ticks, d.checklist.length);
  syncResult(w.id, TITLE[w.id], "writing", null, null, `${e.detail} · attempt ${e.attempts}`);
}

/* ---- CONSOLIDATED STUDENT REPORT ---- */
function resendAll(){
  const p=loadProgress(); let n=0;
  Object.keys(p).forEach(id=>{
    const e=p[id], title=TITLE[id]||id;
    if(e.last) syncResult(id,title,e.kind||"quiz",e.last.s,e.last.t,`best ${e.best.s}/${e.best.t} · ${e.attempts} attempts`);
    else       syncResult(id,title,e.kind||"writing",null,null,`${e.detail||"completed"} · ${e.attempts} attempts`);
    n++;
  });
  const stat=completionStats();
  syncResult("_summary","Overall completion","summary",stat.done,stat.total,`${stat.done}/${stat.total} topics`);
  return n;
}
function renderReport(){
  const st=getStudent()||{}, p=loadProgress(), stat=completionStats();
  const rowsFor = items => items.map(it=>{
    const e=p[it.id]; let status, cls;
    if(!it.ready){ status="Coming soon"; cls="rs-soon"; }
    else if(!e){ status="Not started"; cls="rs-none"; }
    else if(e.last){
      const att=`${e.attempts} attempt${e.attempts>1?"s":""}`;
      const best=(e.best&&e.best.s!==e.last.s)?` (best ${e.best.s}/${e.best.t})`:"";
      status=`${e.last.s}/${e.last.t}${best} · ${att}`; cls="rs-done";
    } else {
      status=`${e.detail||"Completed"} · ${e.attempts} attempt${e.attempts>1?"s":""}`; cls="rs-done";
    }
    return `<tr><td>${esc(it.title)}</td><td class="${cls}">${esc(status)}</td></tr>`;
  }).join("");
  const tables = GROUPS.map(g=>`<div class="rep-group">
    <div class="rep-glabel">${esc(g.label)}</div>
    <table class="rep-tbl"><tbody>${rowsFor(g.items)}</tbody></table></div>`).join("");
  app.innerHTML = headerHTML("My Report") + `<div class="wrap" style="max-width:760px;padding-top:30px">
    <div class="card rep-head" style="padding:24px 26px">
      <div class="eyebrow">Progress report</div>
      <h1 class="serif" style="font-size:26px;margin:6px 0 12px">${esc(st.name||"")}</h1>
      <div class="rep-meta">
        <span><strong>Student ID:</strong> ${esc(st.id||"—")}</span>
        ${st.cls?`<span><strong>Class:</strong> ${esc(st.cls)}</span>`:""}
        <span><strong>Date:</strong> ${esc(new Date().toLocaleDateString())}</span>
      </div>
      <div style="margin-top:16px">
        <div style="font-size:15px;font-weight:700">Completed ${stat.done} of ${stat.total} topics (${stat.pct}%)</div>
        <div class="pbar" style="margin-top:8px"><div class="pbar-fill" style="width:${stat.pct}%"></div></div>
      </div>
    </div>
    ${tables}
    <div class="rep-actions">
      <button class="btn" data-act="print">Print / Save as PDF</button>
      <button class="btn btn-ghost" data-act="resend">Re-send my results to teacher</button>
      <button class="btn btn-ghost" data-act="home">Back to topics</button>
    </div>
    <p id="repMsg" style="font-size:13px;color:var(--muted);margin-top:10px"></p>
  </div>`;
  app.querySelectorAll('[data-act="home"]').forEach(b=>b.addEventListener("click",renderHome));
  app.querySelector('[data-act="print"]').addEventListener("click",()=>window.print());
  app.querySelector('[data-act="resend"]').addEventListener("click",()=>{
    const n=resendAll(); const m=document.getElementById("repMsg");
    if(m) m.textContent = SYNC_URL ? `Sent ${n} result(s) to your teacher.`
      : "Saved on this device. (Teacher sync isn't set up yet — see TEACHER-SETUP.md.)";
  });
  window.scrollTo(0,0);
}

/* ---- PWA: install button + service worker ---- */
let deferredPrompt=null;
const installBtn=document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; installBtn.style.display="block"; });
installBtn.addEventListener("click",async()=>{ if(!deferredPrompt)return; deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null; installBtn.style.display="none"; });
window.addEventListener("appinstalled",()=>{ installBtn.style.display="none"; });
if("serviceWorker" in navigator && location.protocol==="https:"){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }

function boot(){
  flushPending();                                     // resend anything that failed while offline
  const st=getStudent();
  if(st && st.name){ renderHome(); } else { renderIdGate(); }
}
boot();
</script>
